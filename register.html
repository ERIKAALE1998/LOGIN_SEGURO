<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Registro Seguro</title>

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
    rel='stylesheet'>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:#0f172a;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:950px;
        }

        .register-box{
            display:flex;
            background:#111827;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 0 30px rgba(0,255,255,0.2);
        }

        .left-panel{
            width:40%;
            background:linear-gradient(135deg,#00ffff,#2563eb);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .left-panel h1{
            color:white;
            font-size:42px;
            text-align:center;
        }

        .right-panel{
            width:60%;
            background:#1e293b;
            padding:40px;
        }

        .right-panel h2{
            color:white;
            text-align:center;
            margin-bottom:25px;
            font-size:32px;
        }

        .input-box{
            position:relative;
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:14px 45px 14px 15px;
            border:none;
            outline:none;
            border-radius:10px;
            background:#334155;
            color:white;
            font-size:16px;
        }

        .input-box i{
            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            color:#00ffff;
            font-size:20px;
            cursor:pointer;
        }

        .captcha-box{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#334155;
            border-radius:10px;
            padding:12px 15px;
            margin-bottom:20px;
        }

        #captchaText{
            color:#00ffff;
            font-size:26px;
            letter-spacing:5px;
            font-weight:bold;
            user-select:none;
        }

        #refreshCaptcha{
            border:none;
            background:#00ffff;
            color:#111827;
            padding:10px 12px;
            border-radius:8px;
            cursor:pointer;
            font-size:18px;
        }

        .password-rules{
            margin-top:-10px;
            margin-bottom:20px;
            font-size:13px;
            line-height:24px;
        }

        .password-rules span{
            display:block;
        }

        .valid{
            color:#00ff99;
        }

        .invalid{
            color:#ff4d4d;
        }

        .register-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#00ffff;
            color:#111827;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        #message{
            display:block;
            text-align:center;
            margin-bottom:15px;
            font-weight:bold;
        }

        .account-text{
            margin-top:20px;
            text-align:center;
            color:white;
        }

        .account-text a{
            color:#00ffff;
            text-decoration:none;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="register-box">

            <!-- PANEL IZQUIERDO -->
            <div class="left-panel">

                <h1>CREAR CUENTA</h1>

            </div>

            <!-- PANEL DERECHO -->
            <div class="right-panel">

                <h2>Registro</h2>

                <!-- USUARIO -->
                <div class="input-box">

                    <input type="text"
                    id="username"
                    placeholder="Usuario"
                    required>

                    <i class='bx bxs-user'></i>

                </div>

                <!-- CORREO -->
                <div class="input-box">

                    <input type="email"
                    id="email"
                    placeholder="Correo electrónico"
                    required>

                    <i class='bx bxs-envelope'></i>

                </div>

                <!-- CONTRASEÑA -->
                <div class="input-box">

                    <input type="password"
                    id="registerPassword"
                    placeholder="Contraseña"
                    required>

                    <i class='bx bx-show'
                    id="toggleRegister"></i>

                </div>

                <!-- REGLAS -->
                <div class="password-rules">

                    <span id="uppercase" class="invalid">
                        ❌ Al menos una letra mayúscula
                    </span>

                    <span id="lowercase" class="invalid">
                        ❌ Al menos una letra minúscula
                    </span>

                    <span id="number" class="invalid">
                        ❌ Al menos un número
                    </span>

                    <span id="special" class="invalid">
                        ❌ Al menos un carácter especial
                    </span>

                    <span id="length" class="invalid">
                        ❌ Mínimo 8 caracteres
                    </span>

                </div>

                <!-- CAPTCHA -->
                <div class="captcha-box">

                    <p id="captchaText"></p>

                    <button type="button"
                    id="refreshCaptcha">

                        <i class='bx bx-refresh'></i>

                    </button>

                </div>

                <!-- INPUT CAPTCHA -->
                <div class="input-box">

                    <input type="text"
                    id="captchaInput"
                    placeholder="Ingrese el CAPTCHA"
                    required>

                    <i class='bx bx-shield'></i>

                </div>

                <!-- MENSAJE -->
                <small id="message"></small>

                <!-- BOTÓN -->
                <button type="button"
                class="register-btn"
                id="registerBtn">

                    Registrarse

                </button>

                <p class="account-text">

                    ¿Ya tienes una cuenta?

                    <a href="index.html">

                        Iniciar sesión

                    </a>

                </p>

            </div>

        </div>

    </div>

    <script>

        // MOSTRAR / OCULTAR CONTRASEÑA

        const toggleRegister =
        document.getElementById("toggleRegister");

        const registerPassword =
        document.getElementById("registerPassword");

        toggleRegister.addEventListener("click", () => {

            if(registerPassword.type === "password"){

                registerPassword.type = "text";

                toggleRegister.classList.replace(
                    "bx-show",
                    "bx-hide"
                );

            }else{

                registerPassword.type = "password";

                toggleRegister.classList.replace(
                    "bx-hide",
                    "bx-show"
                );

            }

        });

        // CAPTCHA

        const captchaText =
        document.getElementById("captchaText");

        const refreshCaptcha =
        document.getElementById("refreshCaptcha");

        let generatedCaptcha = "";

        function generateCaptcha(){

            const chars =
            "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789";

            generatedCaptcha = "";

            for(let i = 0; i < 6; i++){

                generatedCaptcha += chars.charAt(
                    Math.floor(Math.random() * chars.length)
                );

            }

            captchaText.textContent = generatedCaptcha;

        }

        generateCaptcha();

        refreshCaptcha.addEventListener(
            "click",
            generateCaptcha
        );

        // VALIDACIÓN DE CONTRASEÑA

        const uppercase =
        document.getElementById("uppercase");

        const lowercase =
        document.getElementById("lowercase");

        const number =
        document.getElementById("number");

        const special =
        document.getElementById("special");

        const length =
        document.getElementById("length");

        registerPassword.addEventListener("keyup", () => {

            const password =
            registerPassword.value;

            validateRule(
                uppercase,
                /[A-Z]/.test(password)
            );

            validateRule(
                lowercase,
                /[a-z]/.test(password)
            );

            validateRule(
                number,
                /[0-9]/.test(password)
            );

            validateRule(
                special,
                /[!@#$%^&*(),.?":{}|<>]/.test(password)
            );

            validateRule(
                length,
                password.length >= 8
            );

        });

        function validateRule(element, valid){

            if(valid){

                element.classList.remove("invalid");

                element.classList.add("valid");

                element.innerHTML =
                element.innerHTML.replace("❌","✅");

            }else{

                element.classList.remove("valid");

                element.classList.add("invalid");

                element.innerHTML =
                element.innerHTML.replace("✅","❌");

            }

        }

        // REGISTRO

        const registerBtn =
        document.getElementById("registerBtn");

        const captchaInput =
        document.getElementById("captchaInput");

        const message =
        document.getElementById("message");

        registerBtn.addEventListener("click", () => {

            const username =
            document.getElementById("username").value;

            const email =
            document.getElementById("email").value;

            const password =
            registerPassword.value;

            const userCaptcha =
            captchaInput.value.trim();

            const realCaptcha =
            generatedCaptcha.trim();

            // VALIDAR CAPTCHA

            if(
                userCaptcha.toLowerCase() !==
                realCaptcha.toLowerCase()
            ){

                message.style.color = "#ff4d4d";

                message.textContent =
                "CAPTCHA incorrecto";

                return;

            }

            // VALIDAR CONTRASEÑA

            const validPassword =
                /[A-Z]/.test(password) &&
                /[a-z]/.test(password) &&
                /[0-9]/.test(password) &&
                /[!@#$%^&*(),.?":{}|<>]/.test(password) &&
                password.length >= 8;

            if(!validPassword){

                message.style.color = "#ff4d4d";

                message.textContent =
                "La contraseña no cumple los requisitos";

                return;

            }

            // GUARDAR DATOS

            localStorage.setItem(
                "username",
                username
            );

            localStorage.setItem(
                "email",
                email
            );

            localStorage.setItem(
                "password",
                password
            );

            // MENSAJE

            message.style.color = "#00ff99";

            message.textContent =
            "¡Registro exitoso!";

            // IR AL LOGIN

            setTimeout(() => {

                window.location.href =
                "index.html";

            }, 2000);

        });

    </script>

</body>

</html>
