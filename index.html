<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión Seguro</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="login-box">

            <div class="left">

                <h1>Iniciar Sesión</h1>

                <div class="input-box">
                    <input type="email" id="loginUser" placeholder="Correo electrónico" required>
                    <i class='bx bxs-user'></i>
                </div>

                <div class="input-box">
                    <input type="password" id="loginPassword" placeholder="Contraseña" required>
                    <i class='bx bx-show toggle-password' id="toggleLogin"></i>
                </div>

                <div class="captcha">
                    <input type="checkbox" id="robot">
                    <span>No soy un robot</span>
                </div>

                <button onclick="login()">Ingresar</button>

                <p id="attemptMessage"></p>
                <p id="timerMessage"></p>

                <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

                <p class="account-text">
                    ¿No tienes una cuenta?
                    <a href="register.html">Regístrate</a>
                </p>

            </div>

            <div class="right">
                <h2>BIENVENIDO</h2>
            </div>

        </div>

    </div>

    <!-- MODAL -->
    <div id="welcomeModal" class="modal">
        <div class="modal-content">
            <h2>✔ Bienvenido al sistema</h2>
            <p>Acceso exitoso</p>

            <button onclick="closeModal()">Continuar</button>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>

</html>
